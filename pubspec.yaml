name: klozy
description: "Klozy mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0 <4.0.0'

dependencies:
  auto_route: 10.1.0+1
  bloc: 9.0.0
  dio: 5.8.0+1
  equatable: 2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: 8.0.3
  google_fonts: 6.2.1
  injectable: 2.5.0
  json_annotation: 4.9.0
  shared_preferences: 2.5.3
  provider: 6.1.5
  flutter_native_splash: 2.4.6
  flutter_secure_storage: 9.2.4
  intl: 0.20.2
  event_bus: 2.0.1
  firebase_core: 4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  video_player: ^2.10.1
  image_picker: ^1.2.1
  flutter_stripe: ^13.0.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2

dev_dependencies:
  auto_route_generator: 10.2.3
  build_runner: 2.4.15
  flutter_gen_runner: 5.10.0
  injectable_generator: 2.7.0
  json_serializable: 6.9.5
  lint: 2.8.0
  flutter_lints: 5.0.0

flutter:
  generate: true
  uses-material-design: true

flutter_native_splash:
  color: "#f9f9ff"
  color_dark: "#121317"
  android_12:
    color: "#f9f9ff"
    color_dark: "#121317"
