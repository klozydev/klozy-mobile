name: klozy
description: "Klozy mobile app."
publish_to: 'none'
version: 2.0.0+19

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0 <4.0.0'

dependencies:
  auto_route: 10.1.0+1
  bloc: 9.0.0
  cached_network_image: 3.4.1
  bloc_concurrency: 0.3.0
  dio: 5.8.0+1
  equatable: 2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: 8.0.3
  google_fonts: 8.1.0
  injectable: 2.5.0
  json_annotation: 4.9.0
  shared_preferences: 2.5.3
  provider: 6.1.5
  flutter_native_splash: 2.4.6
  flutter_secure_storage: 9.2.4
  intl: 0.20.2
  event_bus: 2.0.1
  firebase_core: 4.7.0
  firebase_auth: 6.4.0
  google_sign_in: 7.2.0
  sign_in_with_apple: 7.0.1
  crypto: 3.0.7
  video_player: 2.10.1
  visibility_detector: 0.4.0+2
  image_picker: 1.2.1
  file_picker: 11.0.2
  just_audio: 0.10.5
  record: 5.2.1
  path_provider: 2.1.6
  flutter_stripe: 13.0.0
  url_launcher: 6.3.2
  flutter_inappwebview: 6.1.5
  share_plus: 12.0.2
  timeago: 3.7.1
  package_info_plus: 9.0.1
  firebase_messaging: 16.2.0
  cloud_firestore: 6.3.0
  firebase_storage: 13.3.0
  flutter_svg: 2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: 10.2.3
  build_runner: 2.4.15
  flutter_gen_runner: 5.10.0
  injectable_generator: 2.7.0
  json_serializable: 6.9.5
  lint: 2.8.0
  flutter_lints: 5.0.0
  mocktail: 1.0.4
  # Test-only: provides MockPlatformInterfaceMixin for faking the
  # flutter_inappwebview platform in LegalDocPage widget tests.
  plugin_platform_interface: 2.1.8
  # Test-only: faked platform implementations registered in reels/sell
  # widget tests (video_player + image_picker).
  image_picker_platform_interface: 2.11.1
  video_player_platform_interface: 6.6.0
  # Regenerates the iOS app-icon asset catalog from assets/launcher/app_icon.png
  # (see the flutter_launcher_icons: block below). Run with
  # `dart run flutter_launcher_icons`.
  flutter_launcher_icons: 0.14.4

# `record` 5.x otherwise resolves record_platform_interface 1.6.0, which the
# stale record_linux 0.7.2 (the only 1.x linux impl) doesn't implement — and the
# mobile build still type-checks every federated platform impl. Pin the whole
# family to the consistent pre-`startStream` interface 1.4.0 generation, whose
# record_android 1.4.5 also predates the broken 2.x `AdtsContainer` Kotlin code.
dependency_overrides:
  record: 5.0.5
  record_platform_interface: 1.0.2
  record_android: 1.1.0
  record_web: 1.0.4
  record_windows: 1.0.2
  record_darwin: 1.0.1
  record_linux: 0.7.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/svg/

flutter_native_splash:
  color: "#f9f9ff"
  color_dark: "#121317"
  android_12:
    color: "#f9f9ff"
    color_dark: "#121317"

# iOS app-icon generation. Android icons are maintained separately (adaptive
# icons under android/app/src/main/res), so only iOS is generated here.
# The source is a 1024px upscale of the Play Store icon; it carries an alpha
# channel, so remove_alpha_ios flattens it onto the brand-black background
# (App Store rejects marketing icons with alpha). Regenerate with
# `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/launcher/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#000000"
